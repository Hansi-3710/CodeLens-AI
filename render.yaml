# Render Blueprint — deploys the backend API + a managed Postgres database.
# See: https://render.com/docs/blueprint-spec
#
# The execution sandbox (app/execution/docker_worker.py) needs a reachable
# Docker daemon. Render's standard web service does NOT provide
# docker-in-docker — see DEPLOYMENT.md's "Execution sandbox in production"
# section for the two supported options before deploying /solutions/*/execute
# to this target.
databases:
  - name: llm-code-intel-db
    plan: starter
    postgresMajorVersion: 16

services:
  - type: web
    name: llm-code-intel-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: llm-code-intel-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: HUGGINGFACE_API_TOKEN
        sync: false
    buildFilter:
      paths:
        - backend/**
